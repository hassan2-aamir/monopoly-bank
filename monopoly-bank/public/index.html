<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monopoly Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* ── TOKENS ─────────────────────────────────────────────────── */
  :root {
    --navy:    #1B2A4A;
    --navy-l:  #243659;
    --navy-ll: #2D4270;
    --cream:   #F5F0E8;
    --cream-d: #E8E0D0;
    --red:     #C0392B;
    --red-l:   #E74C3C;
    --gold:    #D4AC0D;
    --gold-l:  #F1C40F;
    --green:   #2E7D52;
    --green-l: #27AE60;
    --text:    #1B2A4A;
    --muted:   #6B7A99;
    --fp-bg:   #1a3a2a;
    --fp-border: #2E7D52;
    --shadow:  0 4px 24px rgba(27,42,74,0.18);
    --shadow-sm: 0 2px 8px rgba(27,42,74,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SETUP ──────────────────────────────────────────────────── */
  #setup {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
    background: radial-gradient(ellipse at 60% 30%, #243659 0%, #1B2A4A 70%);
  }

  .logo-block { text-align: center; }
  .logo-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--cream);
  }
  .logo-title span { color: var(--gold); }

  .lobby-card {
    background: var(--cream);
    color: var(--text);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
  }
  .lobby-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1.25rem;
    color: var(--navy);
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  input[type=text], input[type=number], select {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 2px solid var(--cream-d);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: var(--navy);
    background: white;
    transition: border-color 0.15s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--navy); }
  .field { margin-bottom: 1.1rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  .btn-primary { background: var(--navy); color: var(--cream); }
  .btn-primary:hover { background: var(--navy-ll); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold-l); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: var(--green-l); }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: var(--red-l); }
  .btn-sm { padding: 0.5rem 0.9rem; font-size: 0.82rem; width: auto; border-radius: 6px; flex-shrink: 0; }
  .btn-ghost {
    background: transparent;
    border: 2px solid var(--cream-d);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

  .error-msg {
    background: #fde8e8;
    color: var(--red);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    font-size: 0.87rem;
    margin-bottom: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .input-row { display: flex; gap: 0.5rem; }
  .input-row input { flex: 1; }

  .player-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.7rem 0.4rem 0.9rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    color: white;
  }
  .chip-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
  }
  .chip-remove {
    cursor: pointer;
    opacity: 0.75;
    font-size: 0.75rem;
    padding: 0.1rem 0.3rem;
  }
  .chip-remove:hover { opacity: 1; }
  .setup-empty {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    margin-top: 1rem;
  }

  /* ── GAME LAYOUT ────────────────────────────────────────────── */
  #game {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    background: var(--navy);
  }

  .top-bar {
    background: var(--navy-ll);
    border-bottom: 2px solid rgba(212,172,13,0.3);
    padding: 0.8rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .top-bar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
  }
  .top-bar-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    background: rgba(212,172,13,0.15);
    color: var(--gold);
    border: 1px solid rgba(212,172,13,0.3);
  }

  .game-body {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: 0;
  }
  @media (max-width: 900px) {
    .game-body { grid-template-columns: 1fr; }
    .sidebar { border-left: none; border-top: 2px solid rgba(255,255,255,0.08); }
  }

  /* ── PLAYERS GRID ───────────────────────────────────────────── */
  .main-area {
    padding: 1.5rem;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  /* ── PLAYER CARD (bank note style) ─────────────────────────── */
  .pcard {
    background: var(--navy-l);
    border-radius: 14px;
    border: 2px solid transparent;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s, outline-color 0.12s;
  }
  .pcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--player-color, var(--gold));
  }
  .pcard-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .pcard-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--player-color, var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .pcard-balance {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.2rem;
  }
  .pcard-balance.low { color: var(--red-l); }
  .pcard-balance.rich { color: var(--green-l); }
  .pcard-label {
    font-size: 0.68rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* flash animation */
  @keyframes flashGreen {
    0% { background: var(--navy-l); }
    30% { background: rgba(46,125,82,0.35); }
    100% { background: var(--navy-l); }
  }
  @keyframes flashRed {
    0% { background: var(--navy-l); }
    30% { background: rgba(192,57,43,0.35); }
    100% { background: var(--navy-l); }
  }
  .pcard.flash-green { animation: flashGreen 0.8s ease-out; }
  .pcard.flash-red   { animation: flashRed 0.8s ease-out; }
  .fp-card.flash-green { animation: flashGreen 0.8s ease-out; }
  .fp-card.flash-red   { animation: flashRed 0.8s ease-out; }

  /* ── CARD ACTION BUTTONS ────────────────────────────────────── */
  .pcard-actions {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.85rem;
  }
  .pcard-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    transition: transform 0.1s, filter 0.1s;
    flex-shrink: 0;
  }
  .pcard-btn:hover { transform: translateY(-1px); filter: brightness(1.12); }
  .pcard-btn:active { transform: translateY(0); }
  .pcard-btn-add { background: var(--green); }
  .pcard-btn-sub { background: var(--red); }
  .pcard-btn-transfer { background: var(--navy-ll); border: 1px solid rgba(212,172,13,0.5); color: var(--gold); }
  .pcard-btn-collect { background: var(--gold); color: var(--navy); font-size: 0.9rem; }

  /* inline add/subtract form */
  .pcard-inline-form {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.85rem;
    background: rgba(0,0,0,0.22);
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
  }
  .inline-sign { font-weight: 700; font-size: 1.15rem; flex-shrink: 0; }
  .sign-add { color: var(--green-l); }
  .sign-sub { color: var(--red-l); }
  .inline-dollar { color: var(--gold); font-family: 'JetBrains Mono', monospace; font-weight: 600; flex-shrink: 0; }
  .inline-input {
    flex: 1; min-width: 0;
    background: transparent !important;
    border: none !important;
    padding: 0.15rem 0 !important;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    color: var(--cream) !important;
  }
  .inline-input:focus { outline: none; }

  .pcard-inline-error, .transfer-error {
    font-size: 0.72rem;
    color: var(--red-l);
    margin-top: 0.35rem;
    font-family: 'JetBrains Mono', monospace;
    min-height: 1em;
  }

  /* transfer / collect hints */
  .pcard-transfer-hint {
    margin-top: 0.85rem;
    font-size: 0.78rem;
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
  }
  .hint-cancel { cursor: pointer; opacity: 0.7; padding: 0.1rem 0.3rem; }
  .hint-cancel:hover { opacity: 1; }

  .pcard.transfer-source, .fp-card.transfer-source {
    outline: 3px dashed var(--gold);
    outline-offset: 2px;
  }
  .pcard.transfer-target, .fp-card.transfer-target {
    outline: 3px dashed var(--green-l);
    outline-offset: 2px;
  }
  .pcard.transfer-candidate {
    outline: 2px dashed rgba(212,172,13,0.55);
    cursor: pointer;
  }
  .pcard.transfer-candidate:hover {
    outline-color: var(--gold);
    transform: translateY(-2px);
  }

  /* hide number spinners */
  .inline-input::-webkit-outer-spin-button,
  .inline-input::-webkit-inner-spin-button,
  #transfer-amount-input::-webkit-outer-spin-button,
  #transfer-amount-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .inline-input, #transfer-amount-input { -moz-appearance: textfield; }

  /* ── FREE PARKING ───────────────────────────────────────────── */
  .fp-card {
    background: var(--fp-bg);
    border: 2px solid var(--fp-border);
    border-radius: 14px;
    padding: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s, outline-color 0.12s;
  }
  .fp-card.transfer-candidate {
    outline: 2px dashed rgba(46,125,82,0.7);
    cursor: pointer;
  }
  .fp-card.transfer-candidate:hover { transform: translateY(-2px); }
  .fp-icon {
    font-size: 2rem;
    flex-shrink: 0;
  }
  .fp-info { flex: 1; min-width: 0; }
  .fp-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--green-l);
    margin-bottom: 0.2rem;
  }
  .fp-balance {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gold);
  }
  .fp-label {
    font-size: 0.67rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
  }
  .fp-actions-wrap { flex-shrink: 0; }
  .fp-actions-wrap .pcard-actions,
  .fp-actions-wrap .pcard-inline-form,
  .fp-actions-wrap .pcard-transfer-hint { margin-top: 0; }

  /* ── SIDEBAR ────────────────────────────────────────────────── */
  .sidebar {
    border-left: 2px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TX LOG ─────────────────────────────────────────────────── */
  .tx-log {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.25rem 1rem;
  }
  .tx-log h4 {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    position: sticky;
    top: 0;
    background: var(--navy);
    padding-bottom: 0.4rem;
  }
  .tx-item {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .tx-item:last-child { border-bottom: none; }
  .tx-desc {
    font-size: 0.82rem;
    color: var(--cream);
    line-height: 1.3;
  }
  .tx-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tx-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--gold);
    font-weight: 600;
  }
  .tx-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .tx-empty {
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
    text-align: center;
    padding: 1rem 0;
  }
  .tx-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .tx-page-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--cream);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
  }
  .tx-page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
  .tx-page-btn:disabled { opacity: 0.3; cursor: default; }
  .tx-page-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .game-controls {
    padding: 0.75rem 1.25rem;
    border-top: 2px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  /* Toasts */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--navy-ll);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.75rem 1.2rem;
    font-size: 0.87rem;
    color: var(--cream);
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 99;
    max-width: 300px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.toast-err { border-color: var(--red); color: var(--red-l); }

  /* ── TRANSFER OVERLAY (arrow connecting two cards) ───────────── */
  #transfer-svg {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 60;
  }
  #transfer-amount-box {
    position: fixed;
    z-index: 61;
    transform: translate(-50%, -50%);
    background: var(--cream);
    border-radius: 999px;
    padding: 0.55rem 1rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  #transfer-amount-box .inline-dollar { color: var(--navy); }
  #transfer-amount-input {
    width: 80px;
    border: none;
    background: transparent;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--navy);
    outline: none;
    font-family: 'JetBrains Mono', monospace;
  }

  /* util */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Setup: add participants -->
<div id="setup" class="hidden">
  <div class="logo-block">
    <div class="logo-eyebrow">Banker Console</div>
    <div class="logo-title">Monopoly <span>Bank</span></div>
  </div>
  <div class="lobby-card">
    <h2>Add Participants</h2>
    <div class="error-msg" id="setup-error"></div>
    <div class="field">
      <label for="participant-name">Participant Name</label>
      <div class="input-row">
        <input type="text" id="participant-name" placeholder="e.g. Hassan" maxlength="20" autocomplete="off"/>
        <button class="btn btn-gold btn-sm" onclick="addParticipant()">Add</button>
      </div>
    </div>
    <div class="player-chips" id="participant-chips"></div>
    <div class="setup-empty hidden" id="setup-empty">No participants yet — add at least one to start.</div>
    <button class="btn btn-primary" style="margin-top:1.5rem" onclick="startGame()">Start Game ▶</button>
  </div>
</div>

<!-- Game -->
<div id="game" class="hidden">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:0.75rem">
      <div class="top-bar-title">🏦 Monopoly Bank</div>
      <div class="top-bar-badge">BANKER CONSOLE</div>
    </div>
  </div>

  <div class="game-body">
    <!-- Main area: player cards -->
    <div class="main-area" id="main-area">
      <div class="section-label">Free Parking</div>
      <div class="fp-card" id="fp-card" data-id="__free_parking__" onclick="handleCardClick('__free_parking__')">
        <div class="fp-icon">🅿️</div>
        <div class="fp-info">
          <div class="fp-name">Free Parking</div>
          <div class="fp-balance" id="fp-balance">$0</div>
          <div class="fp-label">COMMUNITY POT</div>
        </div>
        <div class="fp-actions-wrap" id="fp-actions"></div>
      </div>

      <div class="section-label">Players</div>
      <div class="players-grid" id="players-grid"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- TX Log -->
      <div class="tx-log" id="tx-log">
        <h4>Transaction Log</h4>
        <div id="tx-list"><div class="tx-empty">No transactions yet.</div></div>
      </div>

      <!-- Game controls -->
      <div class="game-controls" id="game-controls">
        <button class="btn btn-ghost btn-sm" onclick="resetGame()" style="width:100%">🔄 Reset Game</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Transfer overlay: arrow connecting source + target card -->
<svg id="transfer-svg" class="hidden">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" style="fill:var(--gold)"/>
    </marker>
  </defs>
  <line id="transfer-line" x1="0" y1="0" x2="0" y2="0" style="stroke:var(--gold);stroke-width:3" marker-end="url(#arrowhead)"/>
</svg>
<div id="transfer-amount-box" class="hidden">
  <span class="inline-dollar">$</span>
  <input type="number" id="transfer-amount-input" min="1" step="1" inputmode="numeric" placeholder="0"
    onkeydown="handleTransferAmountKeydown(event)" onclick="event.stopPropagation()"/>
</div>
<div class="transfer-error" id="transfer-error" style="position:fixed;z-index:61;display:none"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const FREE_PARKING_ID = '__free_parking__';
const STARTING_BALANCE = 1500;
const COLORS = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22','#E91E63'];
const STORAGE_KEY = 'monopolyBankState';

// ── State ──────────────────────────────────────────────────────────────────────
// state = persisted game data. ui = ephemeral interaction state (never persisted).
let state = loadState() || {
  phase: 'setup',       // 'setup' | 'playing'
  players: [],          // { id, name, balance, color }
  freeParking: 0,
  transactions: [],
  colorIndex: 0,
  idCounter: 1,
};
let ui = { mode: 'idle', activeInline: null, transferSource: null, transferTarget: null };
let prevBalances = {};
let toastTimer = null;
const TX_PAGE_SIZE = 5;
let txPage = 0; // 0 = most recent page, ephemeral (not persisted)

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Init ───────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (state.phase === 'playing') {
    show('game');
    renderGame();
  } else {
    show('setup');
    renderSetup();
  }
});

byId('participant-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addParticipant();
});

// ── Setup screen ───────────────────────────────────────────────────────────────
function addParticipant() {
  clearElem('setup-error');
  const input = byId('participant-name');
  const name = input.value.trim().slice(0, 20);
  if (!name) return;
  const dupe = state.players.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (dupe) return setSetupError('That name is already added.');

  const id = 'p' + (state.idCounter++);
  const color = COLORS[state.colorIndex % COLORS.length];
  state.colorIndex++;
  state.players.push({ id, name, balance: STARTING_BALANCE, color });
  input.value = '';
  saveState();
  renderSetup();
  input.focus();
}

function removeParticipant(id) {
  state.players = state.players.filter(p => p.id !== id);
  saveState();
  renderSetup();
}

function renderSetup() {
  const chips = byId('participant-chips');
  chips.innerHTML = state.players.map(p => `
    <div class="chip" style="background:${p.color}">
      <div class="chip-dot"></div>${escHtml(p.name)}
      <span class="chip-remove" onclick="removeParticipant('${p.id}')" title="Remove">✕</span>
    </div>
  `).join('');
  byId('setup-empty').classList.toggle('hidden', state.players.length > 0);
}

function startGame() {
  clearElem('setup-error');
  if (state.players.length < 1) return setSetupError('Add at least one participant.');
  state.phase = 'playing';
  saveState();
  hide('setup');
  show('game');
  renderGame();
}

function resetGame() {
  if (confirm('Reset the entire game? All data will be cleared.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// ── Entity helpers ─────────────────────────────────────────────────────────────
function getBalance(id) {
  if (id === FREE_PARKING_ID) return state.freeParking;
  const p = state.players.find(p => p.id === id);
  return p ? p.balance : 0;
}
function getName(id) {
  if (id === FREE_PARKING_ID) return 'Free Parking';
  const p = state.players.find(p => p.id === id);
  return p ? p.name : '?';
}

function applyAdd(id, amt) {
  if (id === FREE_PARKING_ID) state.freeParking += amt;
  else state.players.find(p => p.id === id).balance += amt;
  addTransaction(`Bank → ${getName(id)}`, amt);
}
function applySubtract(id, amt) {
  if (id === FREE_PARKING_ID) state.freeParking -= amt;
  else state.players.find(p => p.id === id).balance -= amt;
  addTransaction(`${getName(id)} → Bank`, amt);
}
function applyTransfer(fromId, toId, amt) {
  if (fromId === FREE_PARKING_ID) state.freeParking -= amt;
  else state.players.find(p => p.id === fromId).balance -= amt;
  if (toId === FREE_PARKING_ID) state.freeParking += amt;
  else state.players.find(p => p.id === toId).balance += amt;
  addTransaction(`${getName(fromId)} → ${getName(toId)}`, amt);
}

function addTransaction(desc, amount) {
  state.transactions.unshift({
    desc, amount,
    ts: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
  });
  if (state.transactions.length > 100) state.transactions.pop();
  txPage = 0; // jump back to the newest page whenever a new entry lands
}

// ── UI state machine ───────────────────────────────────────────────────────────
// ui.mode: 'idle' | 'inline' | 'transfer-select' | 'transfer-amount' | 'collect-select'

function resetUI(rerender = true) {
  ui = { mode: 'idle', activeInline: null, transferSource: null, transferTarget: null };
  if (rerender) renderGame();
}

function handleCardClick(id) {
  if (ui.mode === 'transfer-select') {
    if (id === ui.transferSource) resetUI();
    else selectTransferTarget(id);
  } else if (ui.mode === 'collect-select') {
    if (id === FREE_PARKING_ID) resetUI();
    else collectPotTo(id);
  } else if (ui.mode === 'transfer-amount') {
    resetUI();
  }
}

// -- Add / Subtract (3-click: click icon, type amount, press Enter) --
function startInline(type, id) {
  resetUI(false);
  ui.mode = 'inline';
  ui.activeInline = { type, id };
  renderGame();
}
function cancelInline() { resetUI(); }

function handleInlineKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); commitInline(); }
  else if (e.key === 'Escape') { e.preventDefault(); cancelInline(); }
}

function commitInline() {
  const { type, id } = ui.activeInline;
  const input = byId('inline-input');
  const amt = Math.floor(Number(input.value));
  if (!amt || amt <= 0) return showInlineError('Enter a valid amount.');
  if (type === 'sub' && getBalance(id) < amt) return showInlineError(`Only $${fmt(getBalance(id))} available.`);
  if (type === 'add') applyAdd(id, amt); else applySubtract(id, amt);
  resetUI();
}

function showInlineError(msg) {
  const el = byId('inline-error'); if (el) el.textContent = msg;
  const input = byId('inline-input'); if (input) { input.focus(); input.select(); }
}

// -- Transfer (4-click: click arrow, click target card, type amount, press Enter) --
function startTransfer(id) {
  resetUI(false);
  ui.mode = 'transfer-select';
  ui.transferSource = id;
  renderGame();
}

function selectTransferTarget(id) {
  ui.transferTarget = id;
  ui.mode = 'transfer-amount';
  renderGame();
}

function handleTransferAmountKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); commitTransfer(); }
  else if (e.key === 'Escape') { e.preventDefault(); resetUI(); }
}

function commitTransfer() {
  const input = byId('transfer-amount-input');
  const amt = Math.floor(Number(input.value));
  if (!amt || amt <= 0) return showTransferError('Enter a valid amount.');
  const fromBal = getBalance(ui.transferSource);
  if (fromBal < amt) return showTransferError(`Only $${fmt(fromBal)} available.`);
  applyTransfer(ui.transferSource, ui.transferTarget, amt);
  resetUI();
}

function showTransferError(msg) {
  const el = byId('transfer-error');
  el.textContent = msg;
  const input = byId('transfer-amount-input'); if (input) { input.focus(); input.select(); }
}

// -- Collect Free Parking pot (2-click: click trophy, click recipient) --
function startCollect() {
  resetUI(false);
  ui.mode = 'collect-select';
  renderGame();
}

function collectPotTo(id) {
  const amt = state.freeParking;
  if (amt <= 0) return resetUI();
  state.freeParking = 0;
  const p = state.players.find(pl => pl.id === id);
  p.balance += amt;
  addTransaction(`Free Parking → ${p.name}: Collected pot`, amt);
  resetUI();
}

// ── Global cancel: Escape key / click outside ──────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (ui.mode === 'inline') cancelInline();
  else if (ui.mode !== 'idle') resetUI();
});

document.addEventListener('click', e => {
  if (ui.mode === 'idle') return;
  if (e.target.closest('.pcard, .fp-card, #transfer-amount-box')) return;
  if (ui.mode === 'inline') cancelInline();
  else resetUI();
});

window.addEventListener('resize', () => {
  if (ui.mode === 'transfer-amount') positionTransferOverlay();
});

// ── Render ─────────────────────────────────────────────────────────────────────
function renderGame() {
  byId('fp-balance').textContent = '$' + fmt(state.freeParking);
  byId('fp-card').className = 'fp-card ' + cardStateClass(FREE_PARKING_ID);
  byId('fp-actions').innerHTML = fpActionsHTML();

  const grid = byId('players-grid');
  grid.innerHTML = state.players.map(playerCardHTML).join('');

  // flash changed balances
  const current = {};
  state.players.forEach(p => current[p.id] = p.balance);
  current[FREE_PARKING_ID] = state.freeParking;
  Object.keys(current).forEach(id => {
    const prev = prevBalances[id];
    if (prev !== undefined && prev !== current[id]) {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (card) {
        card.classList.remove('flash-green', 'flash-red');
        void card.offsetWidth;
        card.classList.add(current[id] > prev ? 'flash-green' : 'flash-red');
      }
    }
  });
  prevBalances = current;

  renderTxLog();

  if (ui.mode === 'inline') focusInlineInput();
  if (ui.mode === 'transfer-amount') {
    showTransferOverlay();
    requestAnimationFrame(() => { positionTransferOverlay(); focusTransferInput(); });
  } else {
    hideTransferOverlay();
  }

  saveState();
}

function cardStateClass(id) {
  const classes = [];
  if (ui.transferSource === id) classes.push('transfer-source');
  if (ui.transferTarget === id) classes.push('transfer-target');
  if (ui.mode === 'transfer-select' && ui.transferSource !== id) classes.push('transfer-candidate');
  if (ui.mode === 'collect-select') classes.push(id === FREE_PARKING_ID ? 'transfer-source' : 'transfer-candidate');
  return classes.join(' ');
}

function playerCardHTML(p) {
  const balClass = p.balance < 0 ? 'low' : p.balance >= 3000 ? 'rich' : '';
  return `
    <div class="pcard ${cardStateClass(p.id)}" data-id="${p.id}" style="--player-color:${p.color}" onclick="handleCardClick('${p.id}')">
      <div class="pcard-name">
        <div class="pcard-avatar" style="background:${p.color}">${escHtml(p.name[0].toUpperCase())}</div>
        ${escHtml(p.name)}
      </div>
      <div class="pcard-balance ${balClass}">$${fmt(p.balance)}</div>
      <div class="pcard-label">BALANCE</div>
      ${actionsAreaHTML(p.id)}
    </div>
  `;
}

function actionsAreaHTML(id) {
  if (ui.mode === 'inline' && ui.activeInline.id === id) {
    const isAdd = ui.activeInline.type === 'add';
    return `
      <div class="pcard-inline-form">
        <span class="inline-sign ${isAdd ? 'sign-add' : 'sign-sub'}">${isAdd ? '+' : '−'}</span>
        <span class="inline-dollar">$</span>
        <input type="number" inputmode="numeric" min="1" step="1" class="inline-input" id="inline-input"
          onkeydown="handleInlineKeydown(event)" onclick="event.stopPropagation()"/>
      </div>
      <div class="pcard-inline-error" id="inline-error"></div>
    `;
  }
  if ((ui.mode === 'transfer-select' || ui.mode === 'transfer-amount') && ui.transferSource === id) {
    return `<div class="pcard-transfer-hint">Sending…<span class="hint-cancel" onclick="event.stopPropagation();resetUI()" title="Cancel">✕</span></div>`;
  }
  if (ui.mode === 'transfer-amount' && ui.transferTarget === id) {
    return `<div class="pcard-transfer-hint">Receiving…</div>`;
  }
  if (ui.mode === 'collect-select' && id !== FREE_PARKING_ID) {
    return `<div class="pcard-transfer-hint">Tap to receive pot →</div>`;
  }
  return `
    <div class="pcard-actions">
      <button class="pcard-btn pcard-btn-add" title="Add money" onclick="event.stopPropagation();startInline('add','${id}')">+</button>
      <button class="pcard-btn pcard-btn-sub" title="Subtract money" onclick="event.stopPropagation();startInline('sub','${id}')">−</button>
      <button class="pcard-btn pcard-btn-transfer" title="Transfer" onclick="event.stopPropagation();startTransfer('${id}')">→</button>
    </div>
  `;
}

function fpActionsHTML() {
  const id = FREE_PARKING_ID;
  if (ui.mode === 'inline' && ui.activeInline.id === id) {
    const isAdd = ui.activeInline.type === 'add';
    return `
      <div class="pcard-inline-form">
        <span class="inline-sign ${isAdd ? 'sign-add' : 'sign-sub'}">${isAdd ? '+' : '−'}</span>
        <span class="inline-dollar">$</span>
        <input type="number" inputmode="numeric" min="1" step="1" class="inline-input" id="inline-input"
          onkeydown="handleInlineKeydown(event)" onclick="event.stopPropagation()"/>
      </div>
      <div class="pcard-inline-error" id="inline-error"></div>
    `;
  }
  if (ui.mode === 'collect-select') {
    return `<div class="pcard-transfer-hint">Select recipient…<span class="hint-cancel" onclick="event.stopPropagation();resetUI()" title="Cancel">✕</span></div>`;
  }
  if ((ui.mode === 'transfer-select' || ui.mode === 'transfer-amount') && ui.transferSource === id) {
    return `<div class="pcard-transfer-hint">Sending…<span class="hint-cancel" onclick="event.stopPropagation();resetUI()" title="Cancel">✕</span></div>`;
  }
  if (ui.mode === 'transfer-amount' && ui.transferTarget === id) {
    return `<div class="pcard-transfer-hint">Receiving…</div>`;
  }
  return `
    <div class="pcard-actions">
      <button class="pcard-btn pcard-btn-add" title="Add money" onclick="event.stopPropagation();startInline('add','${id}')">+</button>
      <button class="pcard-btn pcard-btn-sub" title="Subtract money" onclick="event.stopPropagation();startInline('sub','${id}')">−</button>
      <button class="pcard-btn pcard-btn-transfer" title="Transfer" onclick="event.stopPropagation();startTransfer('${id}')">→</button>
      ${state.freeParking > 0 ? `<button class="pcard-btn pcard-btn-collect" title="Give entire pot to a player" onclick="event.stopPropagation();startCollect()">🏆</button>` : ''}
    </div>
  `;
}

function focusInlineInput() {
  const input = byId('inline-input');
  if (input) input.focus();
}

function renderTxLog() {
  const list = byId('tx-list');
  if (!state.transactions.length) {
    list.innerHTML = '<div class="tx-empty">No transactions yet.</div>';
    return;
  }
  const totalPages = Math.max(1, Math.ceil(state.transactions.length / TX_PAGE_SIZE));
  txPage = Math.min(txPage, totalPages - 1);
  const start = txPage * TX_PAGE_SIZE;
  const pageItems = state.transactions.slice(start, start + TX_PAGE_SIZE);

  list.innerHTML = pageItems.map(tx => `
    <div class="tx-item">
      <div class="tx-desc">${escHtml(tx.desc)}</div>
      <div class="tx-meta">
        <div class="tx-amount">$${fmt(tx.amount)}</div>
        <div class="tx-time">${tx.ts}</div>
      </div>
    </div>
  `).join('') + `
    <div class="tx-pagination">
      <button class="tx-page-btn" onclick="changeTxPage(1)" ${txPage >= totalPages - 1 ? 'disabled' : ''}>‹ Older</button>
      <div class="tx-page-label">Page ${txPage + 1} of ${totalPages}</div>
      <button class="tx-page-btn" onclick="changeTxPage(-1)" ${txPage <= 0 ? 'disabled' : ''}>Newer ›</button>
    </div>
  `;
}

function changeTxPage(delta) {
  const totalPages = Math.max(1, Math.ceil(state.transactions.length / TX_PAGE_SIZE));
  txPage = Math.min(Math.max(0, txPage + delta), totalPages - 1);
  renderTxLog();
}

// ── Transfer overlay (arrow connecting source + target) ────────────────────────
function showTransferOverlay() {
  show('transfer-svg');
  show('transfer-amount-box');
  byId('transfer-error').style.display = 'none';
  byId('transfer-error').textContent = '';
}
function hideTransferOverlay() {
  hide('transfer-svg');
  hide('transfer-amount-box');
  byId('transfer-error').style.display = 'none';
}

function positionTransferOverlay() {
  const src = document.querySelector(`[data-id="${ui.transferSource}"]`);
  const tgt = document.querySelector(`[data-id="${ui.transferTarget}"]`);
  if (!src || !tgt) return;
  const r1 = src.getBoundingClientRect();
  const r2 = tgt.getBoundingClientRect();
  const x1 = r1.left + r1.width / 2, y1 = r1.top + r1.height / 2;
  const x2 = r2.left + r2.width / 2, y2 = r2.top + r2.height / 2;

  const line = byId('transfer-line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);

  const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
  const box = byId('transfer-amount-box');
  box.style.left = midX + 'px';
  box.style.top = midY + 'px';

  const err = byId('transfer-error');
  err.style.left = midX + 'px';
  err.style.top = (midY + 28) + 'px';
  err.style.transform = 'translateX(-50%)';
  err.style.textAlign = 'center';
}

function focusTransferInput() {
  const input = byId('transfer-amount-input');
  if (input) { input.value = ''; input.focus(); }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function byId(id) { return document.getElementById(id); }
function show(id) { byId(id)?.classList.remove('hidden'); }
function hide(id) { byId(id)?.classList.add('hidden'); }
function fmt(n) { return Number(n).toLocaleString(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearElem(id) { const el = byId(id); if (el) { el.textContent = ''; el.classList.remove('show'); } }
function setSetupError(msg) { const el = byId('setup-error'); el.textContent = msg; el.classList.add('show'); }

function showToast(msg, isErr = false) {
  const t = byId('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' toast-err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>
</body>
